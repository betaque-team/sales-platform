# =============================================================================
# CI — runs on every push and PR to main. Gates deploys.
# =============================================================================
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Values are fine to keep in the repo — used only by the ephemeral CI DB
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jobplatform
  DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/jobplatform
  REDIS_URL: redis://localhost:6379/0
  JWT_SECRET: ci-test-secret
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: jobplatform

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobplatform
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # No requirements.txt yet -- mirror the Dockerfile's pip install set
          pip install \
            "fastapi[standard]>=0.115" "uvicorn[standard]>=0.32" \
            "sqlalchemy[asyncio]>=2.0" "asyncpg>=0.30" "alembic>=1.14" \
            "pydantic-settings>=2.6" "authlib>=1.4" "httpx>=0.28" \
            "python-jose[cryptography]>=3.3" "celery[redis]>=5.4" "redis>=5.2" \
            "pyyaml>=6.0" "openpyxl>=3.1" "python-multipart>=0.0.12" \
            "itsdangerous>=2.1" "psycopg2-binary>=2.9" \
            "pdfplumber>=0.11" "python-docx>=1.1" "anthropic>=0.40" \
            "beautifulsoup4>=4.12" "dnspython>=2.6" \
            pytest pytest-asyncio

      - name: Bootstrap DB schema (create_all + alembic stamp head)
        # Why not ``alembic upgrade head``? The first migration
        # (``a1b2c3d4e5f6_add_scoring_signals_and_job_questions``) has
        # ``down_revision = None`` but FK-references ``jobs.id`` —
        # which no migration creates because the original schema was
        # built via ``Base.metadata.create_all`` in pre-alembic days.
        # Prod is unaffected (the original tables exist there from the
        # pre-alembic era), but CI's fresh-DB path 500s on the missing
        # FK target. ``init_ci_db`` does ``create_all + alembic stamp
        # head`` so CI gets a working DB without rewriting history.
        # The proper long-term fix is a hand-written baseline migration
        # — see scripts/init_ci_db.py module docstring for the rationale.
        run: python -m scripts.init_ci_db

      - name: Verify alembic upgrade head is now a no-op
        # Belt-and-suspenders: after the bootstrap the head is stamped,
        # so an actual ``alembic upgrade head`` invocation should walk
        # zero migrations. This catches a future drift where someone
        # adds a migration but forgets to also extend ``init_ci_db``'s
        # model imports.
        run: alembic upgrade head

      - name: Run tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests/ directory — skipping pytest (CI still ensures migrations apply)"
          fi

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        # No package-lock.json in repo yet -- use npm install (mirrors Dockerfile)
        run: npm install
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
