# =============================================================================
# CI — runs on every push and PR to main. Gates deploys.
# =============================================================================
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Values are fine to keep in the repo — used only by the ephemeral CI DB
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jobplatform
  DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/jobplatform
  REDIS_URL: redis://localhost:6379/0
  JWT_SECRET: ci-test-secret
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: jobplatform

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobplatform
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: platform/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install fastapi uvicorn sqlalchemy asyncpg alembic pydantic-settings httpx \
              "python-jose[cryptography]" celery redis pyyaml python-multipart itsdangerous \
              psycopg2-binary pdfplumber python-docx anthropic beautifulsoup4 dnspython \
              pytest pytest-asyncio
          fi

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests/ directory — skipping pytest (CI still ensures migrations apply)"
          fi

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
