# =============================================================================
# CD — build images on GHCR and trigger VM-side ci-deploy.sh on push to main.
#
# Design:
#   1. Precheck job: fast, native-arch (x86_64) tsc/build/pip verification.
#      Catches the "phantom deploy" bug where a silent TS error kills the
#      slow arm64 Docker build 10 min in. Fails in ~2 min on issues.
#   2. Build job: docker buildx builds backend + frontend, pushes both to
#      ghcr.io/<owner>/sales-platform/{backend,frontend}:sha-<short>
#   3. Deploy job: SSHes to VM as `deploy` user. The authorized_keys forced
#      command (/opt/sales-platform/scripts/ci-deploy.sh) ignores whatever we
#      type as the SSH command -- the script parses $SSH_ORIGINAL_COMMAND and
#      accepts only `deploy <tag> | rollback <tag> | status`. A stolen deploy
#      key therefore can't pop a shell or exfil .env.
#   4. Verify job: curls the live URL after the VM reports success and
#      confirms the bundle hash actually changed. Catches the failure mode
#      where ci-deploy.sh reports success but pulled the wrong tag or the
#      container didn't actually restart.
#
# History:
#   2026-04-16 Round 27.2 post-mortem: a silent TS error (`import { X }`,
#   unused) in Layout.tsx failed `tsc && vite build` inside the arm64
#   Dockerfile for ~4 hours. Previous deploy.yml version ran the slow
#   arm64 build directly — by the time it failed, the operator had
#   already moved on, and the failing deploy looked like a "phantom"
#   (prod still serving old bundle). Fix: precheck on x86_64 FIRST,
#   gate arm64 build behind it, then verify the live deploy actually
#   picked up the new bundle hash.
#
# Secrets required (scoped to Environment: production — see docs/DEPLOY_SETUP.md
# for values; do not inline them here):
#   DEPLOY_SSH_KEY     -- ed25519 private key matching the VM's authorized_keys
#   DEPLOY_HOST        -- VM public IP
#   DEPLOY_USER        -- VM deploy user (no sudo, docker group only)
#   DEPLOY_HOSTKEY     -- `ssh-keyscan -t ed25519 <host>` output (pins host key)
#   ANTHROPIC_API_KEY  -- optional. Piped to ci-deploy.sh on stdin line 2 and
#                         written to /opt/sales-platform/platform/.env. Unset =
#                         empty line = "leave existing .env value alone" (so a
#                         missing Secret never wipes a manually-provisioned key).
# =============================================================================
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Override image tag to build & deploy (default: sha-<shortsha>)"
        required: false
      skip_precheck:
        description: "Skip the fast-fail precheck (only use if precheck is itself broken)"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/sales-platform/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/sales-platform/frontend
  PROD_URL: https://salesplatform.reventlabs.com

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Fast-fail precheck on native x86_64.
  #
  # Goal: if this commit is unbuildable, know within ~2 min instead of
  # letting the QEMU arm64 Docker build discover it 5-10 min later. The
  # arm64 build step on emulated QEMU is expensive — failing fast here
  # saves runner minutes AND gives the operator a clearer error (`tsc`
  # output in step log) than the Docker layer failure ("npm run build
  # returned 1" from inside a cross-compiled container).
  #
  # Mirrors the critical bits of ci.yml but trimmed — no DB services,
  # no full pytest suite. Just "does this code compile and bundle?".
  # ---------------------------------------------------------------------------
  precheck:
    name: Fast-fail precheck
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_precheck }}
    outputs:
      frontend_hash: ${{ steps.fe_hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v4

      # Frontend: the exact path that has bitten us. tsc && vite build.
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: platform/frontend
        run: npm install --no-audit --no-fund

      - name: Frontend typecheck
        working-directory: platform/frontend
        run: npx tsc --noEmit

      - name: Frontend build
        working-directory: platform/frontend
        run: npm run build

      # Capture the bundle filename so the verify job can check prod
      # is actually serving THIS build's hash (not a cached old one).
      - name: Capture frontend bundle hash
        id: fe_hash
        working-directory: platform/frontend
        run: |
          # Glob directly (shellcheck SC2010): avoid `ls | grep` so a
          # filename with spaces or newlines can't break parsing. Vite
          # currently emits `index-<hash>.js` as the entry chunk;
          # pattern lifted verbatim from its default manifest config.
          HASH=""
          for f in dist/assets/index-*.js; do
            [ -e "$f" ] || continue
            HASH="$(basename "$f")"
            break
          done
          if [ -z "$HASH" ]; then
            echo "::warning::Could not extract frontend bundle hash — verify job will skip"
          else
            echo "Frontend bundle: $HASH"
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      # Backend: minimal import check. Full tests live in ci.yml.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        working-directory: platform/backend
        run: |
          pip install --upgrade pip
          # Mirror the Dockerfile's pip set. Any drift here will be caught
          # by the arm64 Docker build later, but it's cheaper to find it
          # now on x86_64.
          pip install \
            "fastapi[standard]>=0.115" "uvicorn[standard]>=0.32" \
            "sqlalchemy[asyncio]>=2.0" "asyncpg>=0.30" "alembic>=1.14" \
            "pydantic-settings>=2.6" "authlib>=1.4" "httpx>=0.28" \
            "python-jose[cryptography]>=3.3" "celery[redis]>=5.4" "redis>=5.2" \
            "pyyaml>=6.0" "openpyxl>=3.1" "python-multipart>=0.0.12" \
            "itsdangerous>=2.1" "psycopg2-binary>=2.9" \
            "pdfplumber>=0.11" "python-docx>=1.1" "anthropic>=0.40" \
            "beautifulsoup4>=4.12" "dnspython>=2.6" "bcrypt>=4.2"

      - name: Backend import smoke test
        working-directory: platform/backend
        # Just importing app.main boots the FastAPI app, resolves every
        # router import, and validates pydantic models at import time.
        # Catches "missing env var", "alembic schema drift broke an
        # import", etc. in 5 seconds instead of 10 minutes.
        env:
          DATABASE_URL: postgresql+asyncpg://placeholder:placeholder@localhost:5432/placeholder
          DATABASE_URL_SYNC: postgresql://placeholder:placeholder@localhost:5432/placeholder
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: precheck-placeholder-secret
        run: |
          python -c "from app.main import app; print('FastAPI app imports OK:', app.title)"

  # ---------------------------------------------------------------------------
  # Build both images and push to GHCR.
  # Gated behind precheck so a broken commit can't burn 10 min on QEMU.
  # ---------------------------------------------------------------------------
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [precheck]
    # Allow running via workflow_dispatch with skip_precheck=true in the
    # edge case where precheck itself is broken (e.g., new Node LTS ships
    # and breaks setup-node transiently). Otherwise require precheck pass.
    if: ${{ always() && (needs.precheck.result == 'success' || inputs.skip_precheck) }}
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      frontend_hash: ${{ needs.precheck.outputs.frontend_hash }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      # VM is Oracle Ampere A1 (aarch64). Ubuntu runners are x86_64, so we
      # need QEMU to emulate ARM during build. buildx drives the multi-arch
      # build; `platforms: linux/arm64` in each build-push step scopes it.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: platform/backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: platform/frontend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ---------------------------------------------------------------------------
  # SSH to VM, invoke ci-deploy.sh via forced-command.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://salesplatform.reventlabs.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOSTKEY: ${{ secrets.DEPLOY_HOSTKEY }}
        run: |
          mkdir -p ~/.ssh
          umask 077
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${HOSTKEY:-}" ]; then
            echo "$HOSTKEY" > ~/.ssh/known_hosts
          else
            # Fallback: keyscan on first run. In steady-state, set DEPLOY_HOSTKEY
            # in GH Secrets (output of `ssh-keyscan -t ed25519 <host>`) to pin.
            ssh-keyscan -t ed25519 -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          fi

      # 2026-04-17: ship infra files (compose YAML, helper scripts, nginx
      # config) to the VM so changes to those files actually take effect.
      # Until this step existed, the deploy pipeline only updated container
      # *images* — every infra-only change in git silently failed on the
      # VM until somebody noticed days later (the host-metrics bind-mount
      # added on Apr 15 didn't reach prod until Apr 17 because of this).
      #
      # The tarball is extracted by ci-deploy.sh::sync_infra_tarball, which
      # validates every entry against an allowlist before unpacking. The
      # SCP target /tmp/sales-platform-infra.tgz is consumed and deleted
      # by that function on success.
      #
      # The forced-command SSH config restricts the deploy user to running
      # ci-deploy.sh — but `scp` is a separate channel, so we need to use
      # `cat > /tmp/...` redirected through the same forced command. We
      # work around this by sending the tarball over stdin to a `cat`
      # invocation that the forced-command pass-through accepts: ci-deploy.sh
      # treats unknown verbs as errors, but we can pipe directly to a
      # `tee` via `ssh ... "tee /tmp/..."`. Simpler though: SCP works
      # against the same SSH key as long as the authorized_keys entry
      # also allows it (no command="" override is needed for SCP if the
      # key was added without forced-command — TODO: confirm with VM
      # config). For now use `cat` over the existing SSH channel which
      # always works regardless of forced-command.
      - name: Build + ship infra tarball to VM
        run: |
          # Build a deterministic tarball from the repo's platform/ subdir.
          # Only the files ci-deploy.sh's allow-list accepts:
          #   - docker-compose.prod.yml, docker-compose.tunnel.yml
          #   - infra/scripts/** (collect-host-metrics.sh, keepalive.sh, etc.)
          #   - infra/nginx/** (server config, conf.d/*)
          tar czf /tmp/sales-platform-infra.tgz \
            -C platform \
            docker-compose.prod.yml \
            docker-compose.tunnel.yml \
            infra/scripts \
            infra/nginx
          ls -lh /tmp/sales-platform-infra.tgz

          # Ship to /tmp on the VM. The deploy user owns /tmp entries it
          # creates here, and ci-deploy.sh::sync_infra_tarball deletes
          # the file after a successful extraction. Use `cat > $path`
          # over SSH instead of scp, since the forced-command authorized_keys
          # entry blocks scp's separate subsystem channel.
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "stage-infra" < /tmp/sales-platform-infra.tgz

      - name: Trigger deploy on VM
        # Stdin contract for the `deploy` verb on ci-deploy.sh:
        #   Line 1: GH_TOKEN           — for `docker login ghcr.io` (private pull)
        #   Line 2: ANTHROPIC_API_KEY  — written to /opt/sales-platform/platform/.env
        #                                by ci-deploy.sh. Empty string = leave the
        #                                existing .env value alone (so an accidental
        #                                un-set of the GH Secret doesn't wipe a
        #                                manually-provisioned key).
        #
        # All values are minted/scoped to this run (GH_TOKEN) or come from
        # Environment-scoped Secrets (ANTHROPIC_API_KEY, env: production).
        # Nothing touches disk on the VM beyond ci-deploy.sh's controlled
        # writes (.env at 600, docker config at 600).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          {
            printf '%s\n' "$GH_TOKEN"
            # `${VAR:-}` so an unset Secret expands to empty instead of
            # failing `set -u`. Empty line 2 is the documented "no change"
            # signal — see the contract comment above.
            printf '%s\n' "${ANTHROPIC_API_KEY:-}"
          } | ssh -i ~/.ssh/deploy_key \
                  -o BatchMode=yes \
                  ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
                  "deploy ${{ needs.build.outputs.tag }} $GH_ACTOR"

      - name: Fetch status
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "status" || true

      - name: Deploy summary
        if: always()
        run: |
          echo "### Deploy — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${{ needs.build.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref | \`${{ github.ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | ${{ env.PROD_URL }} |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Verify the live deploy actually picked up the new bundle.
  #
  # Post-mortem context: the 2026-04-16 phantom-deploy incident showed
  # that "SSH succeeded" + "ci-deploy.sh reported status OK" + "GHCR has
  # the new image" can ALL be true while production still serves the old
  # bundle (because the Docker build itself failed silently in an earlier
  # round and the VM was pulling the last-successful image tag). The
  # only authoritative signal is: fetch / from prod, parse the asset
  # hash from index.html, confirm it matches what we just built.
  # ---------------------------------------------------------------------------
  verify:
    name: Verify live bundle
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: ${{ always() && needs.deploy.result == 'success' && needs.build.outputs.frontend_hash != '' }}
    steps:
      - name: Wait for rollout propagation
        # ci-deploy.sh returns once `docker compose up -d` dispatches.
        # Give nginx's old worker ~20s to finish in-flight requests and
        # let Cloudflare origin-shield pull the new index.html.
        run: sleep 20

      - name: Fetch live index.html and extract bundle hash
        id: live
        run: |
          # Cache-bust query string: Cloudflare / nginx / any intermediate
          # cache must fetch fresh. A unique nonce in the URL forces a
          # MISS. We also send Cache-Control: no-cache as a belt-and-
          # suspenders measure, though some CDNs ignore request-side
          # directives.
          NONCE="$(date +%s)-${{ github.run_id }}"
          URL="${{ env.PROD_URL }}/?__deployverify=$NONCE"
          # --compressed: Cloudflare serves gzip, decode it.
          # -L: follow any http→https or www redirect.
          # -s: quiet. We want the body for parsing.
          # --max-time 30: give the origin a generous window on cold start.
          BODY="$(curl -sL --compressed --max-time 30 \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "$URL" || true)"
          if [ -z "$BODY" ]; then
            echo "::error::Empty body from $URL — origin may be down"
            exit 1
          fi
          # Vite emits: <script type="module" crossorigin src="/assets/index-XXXX.js">
          # …with the hash our precheck captured. Extract and compare.
          LIVE_HASH="$(echo "$BODY" | grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' | head -1 | sed 's|/assets/||' || true)"
          echo "live_hash=$LIVE_HASH" >> "$GITHUB_OUTPUT"
          echo "Live bundle: $LIVE_HASH"
          echo "Expected:    ${{ needs.build.outputs.frontend_hash }}"

      - name: Assert live bundle matches built bundle
        run: |
          LIVE="${{ steps.live.outputs.live_hash }}"
          EXPECTED="${{ needs.build.outputs.frontend_hash }}"
          if [ -z "$LIVE" ]; then
            echo "::error::Could not parse bundle hash from live index.html — SPA may be broken"
            exit 1
          fi
          if [ "$LIVE" != "$EXPECTED" ]; then
            echo "::error::PHANTOM DEPLOY — live bundle ($LIVE) does NOT match this build ($EXPECTED)"
            echo "::error::Possible causes: (1) Cloudflare cache still serving old index.html, (2) container didn't restart, (3) image pulled wrong tag. Investigate VM logs."
            exit 1
          fi
          echo "✓ Live bundle matches build — deploy confirmed."

      - name: Verify backend healthcheck
        run: |
          # /api/v1 has no /healthz in the router, but /api/v1/auth/me
          # reliably returns 401 unauthenticated. A 5xx here means backend
          # container is wedged.
          STATUS="$(curl -sL -o /dev/null -w '%{http_code}' --max-time 15 "${{ env.PROD_URL }}/api/v1/auth/me" || echo 000)"
          case "$STATUS" in
            200|401) echo "✓ Backend responsive (HTTP $STATUS)";;
            5*) echo "::error::Backend returned 5xx ($STATUS) — container may be crash-looping"; exit 1;;
            000) echo "::error::Backend unreachable from GH runner"; exit 1;;
            *)  echo "::warning::Unexpected backend status $STATUS — not failing the deploy but investigate";;
          esac

      # F234 post-mortem: deploy.yml piped ANTHROPIC_API_KEY to ci-deploy.sh
      # on stdin line 2, but the VM script only read line 1 (the GHCR token).
      # The line-2 bytes fell into the void on connection close, every deploy
      # ran green, and all three AI features were dead in prod for weeks.
      # The post-deploy assertion below catches this drift on day 1: if the
      # GitHub Secret is non-empty but the running backend reports
      # ai_configured=false, fail the deploy loudly instead of silently
      # leaving prod in a half-rolled state.
      - name: Verify ANTHROPIC_API_KEY reached the backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Skip the assertion if the Secret is intentionally unset (some
          # forks deploy without AI features). We only fail on the
          # asymmetric case: Secret IS set, backend reports it ISN'T.
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::notice::ANTHROPIC_API_KEY Secret is unset — skipping ai_configured assertion."
            exit 0
          fi
          # /api/health is public (auth-free) and exposes the boolean
          # `ai_configured` without leaking the key value/prefix/length.
          # F234 added it specifically as a CI assertion target.
          BODY="$(curl -sL --max-time 10 "${{ env.PROD_URL }}/api/health" || echo '')"
          if echo "$BODY" | grep -q '"ai_configured": *true'; then
            echo "✓ Backend reports ANTHROPIC_API_KEY is configured."
            exit 0
          fi
          if echo "$BODY" | grep -q '"ai_configured": *false'; then
            echo "::error::F234 SILENT HALF-ROLLOUT — GitHub Secret ANTHROPIC_API_KEY is set but backend reports ai_configured=false."
            echo "::error::Likely cause: ci-deploy.sh on the VM didn't persist the key to .env. Verify the VM-side script matches platform/scripts/ci-deploy.sh and includes persist_anthropic_key_from_stdin."
            exit 1
          fi
          echo "::warning::Could not parse ai_configured from /api/health response — soft-passing. Body excerpt: ${BODY:0:200}"

      # 2026-04-17: same shape as the F234 ai_configured assertion above,
      # but for the VM metrics pipeline. Pre-fix, the only signal that
      # /host got bind-mount-broken was an admin opening the /monitoring
      # page and noticing the panel had been dark for two days. Now any
      # regression to the docker-compose mount, the collector script,
      # the cron, or host_stats.py fails the deploy on the next push.
      #
      # Soft-passes if the snapshot file is just briefly stale (collector
      # cron is */2 min, so the first read after a backend restart can
      # legitimately see a >120 s old snapshot — verify_vm_metrics_pipeline
      # already retries 3× server-side). Hard-fails only if the
      # `vm_metrics_available` boolean stays false in the public health
      # endpoint AFTER the deploy job's retry loop ran.
      - name: Verify VM metrics pipeline reached prod
        run: |
          BODY="$(curl -sL --max-time 10 "${{ env.PROD_URL }}/api/health" || echo '')"
          if echo "$BODY" | grep -q '"vm_metrics_available": *true'; then
            AGE="$(echo "$BODY" | grep -oE '"vm_metrics_age_seconds":[ ]*[0-9]+' | grep -oE '[0-9]+' || echo unknown)"
            echo "✓ VM metrics pipeline live (snapshot age ${AGE}s)."
            exit 0
          fi
          if echo "$BODY" | grep -q '"vm_metrics_available": *false'; then
            echo "::error::VM_METRICS REGRESSION — /api/health reports vm_metrics_available=false post-deploy."
            echo "::error::Likely causes: (1) docker-compose.prod.yml lost the /host bind-mount, (2) collector cron stopped writing /opt/sales-platform/host-metrics/metrics.json, (3) backend container can't read the file. SSH to the VM and check ci-deploy.log + sudo docker exec sales-platform-backend-1 ls /host/."
            exit 1
          fi
          echo "::warning::Could not parse vm_metrics_available from /api/health — soft-pass. Body excerpt: ${BODY:0:200}"

      - name: Verification summary
        if: always()
        run: |
          echo "### Verify — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expected bundle | \`${{ needs.build.outputs.frontend_hash }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Live bundle | \`${{ steps.live.outputs.live_hash }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | ${{ env.PROD_URL }} |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Append a stub entry to docs/RELEASES.md on every successful deploy.
  #
  # This runs on the default branch only (push to main + verify succeeded)
  # and commits directly back to main with [skip ci] so it doesn't loop.
  # The stub is short on purpose — just enough machine data (sha / tag /
  # UTC / commit subject) to locate the change. A human is expected to
  # edit the stub with a user-facing one-liner when the release is
  # notable; boring fixes are fine to leave as-is.
  #
  # The marker `<!-- RELEASES_LOG_START -->` in RELEASES.md is where new
  # entries insert — we prepend (newest at top) rather than append, so
  # the file reads top-down as the release feed.
  # ---------------------------------------------------------------------------
  append-release:
    name: Append release log entry
    runs-on: ubuntu-latest
    needs: [build, deploy, verify]
    # Only on merges to main, only when verify passed. workflow_dispatch
    # runs (manual deploys) still append — operator intent is the same
    # ("this went to prod"). Skip on any upstream failure so we don't
    # log a release that didn't actually ship.
    if: ${{ always() && needs.verify.result == 'success' && github.ref == 'refs/heads/main' }}
    permissions:
      # `contents: write` lets the workflow commit + push the updated
      # RELEASES.md back to main. Scoped to this job only; the other
      # jobs keep the default `contents: read`.
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can read the commit subject. Depth 2
          # would cover the single commit but fetch-depth: 0 is
          # future-proof against wanting multi-commit annotations.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN for the push. Branch
          # protection on main must allow the Actions bot OR the
          # workflow will 403 on push — document this in
          # docs/DEPLOYMENT_PROCESS.md if protection is added.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepend stub entry to docs/RELEASES.md
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-7)"
          TAG="${{ needs.build.outputs.tag }}"
          DATE_UTC="$(date -u +%Y-%m-%d)"
          SUBJECT="$(git log -1 --pretty=%s '${{ github.sha }}')"
          # Escape characters that would break the markdown or the sed
          # replacement below. `|` is our sed delimiter; `\` must be
          # literal; newlines must not appear in SUBJECT.
          SUBJECT_ESCAPED=$(printf '%s' "$SUBJECT" | tr '\n' ' ' | sed 's/|/\\|/g')

          STUB="## ${DATE_UTC} · ${SHORT_SHA} · ${TAG}
          ${SUBJECT_ESCAPED}
          "
          # Prepend BELOW the start marker and BEFORE the first existing
          # entry. Using awk rather than sed because multi-line insertion
          # via sed is dialect-specific (GNU vs BSD).
          awk -v stub="$STUB" '
            /<!-- RELEASES_LOG_START -->/ {
              print
              print ""
              print stub
              inserted = 1
              next
            }
            { print }
          ' docs/RELEASES.md > docs/RELEASES.md.tmp

          mv docs/RELEASES.md.tmp docs/RELEASES.md

          echo "Prepended:"
          echo "$STUB"

      - name: Commit + push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # No-op guard: if RELEASES.md didn't actually change (e.g. the
          # marker was removed in a prior edit), don't create an empty
          # commit. `git diff --quiet` exits 1 on diff, 0 on clean.
          if git diff --quiet docs/RELEASES.md; then
            echo "No change to RELEASES.md — skipping commit."
            exit 0
          fi

          git add docs/RELEASES.md
          # [skip ci] prevents the Deploy workflow from re-triggering
          # on our own push — otherwise each deploy would loop once.
          git commit -m "docs(releases): append ${{ needs.build.outputs.tag }} [skip ci]"
          git push origin HEAD:main
