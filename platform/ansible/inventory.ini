# =============================================================================
# Ansible Inventory — Sales Data Platform
# =============================================================================
# Update the IP / hostname below to match your target server.
# For Oracle Cloud free tier ARM VMs, use the public IP.
# For Hetzner or any other VPS, use the server IP.
#
# Quick start:
#   1. Replace 1.2.3.4 with your server IP
#   2. Update ansible_user if not ubuntu (e.g., opc for Oracle Cloud)
#   3. Update ansible_ssh_private_key_file to your SSH key path
#   4. Run: ansible-playbook playbooks/setup.yml
# =============================================================================

[production]
sales-platform  ansible_host=1.2.3.4  ansible_user=ubuntu  ansible_ssh_private_key_file=~/.ssh/id_rsa

[production:vars]
# Domain for HTTPS (set to empty string to skip Nginx/SSL setup)
app_domain=sales.yourcompany.com

# Docker image registry (leave blank for local builds)
docker_registry=

# Notification email for backup failures (optional)
alert_email=

# Server architecture: amd64 or arm64 (Oracle Cloud free = arm64)
server_arch=arm64
