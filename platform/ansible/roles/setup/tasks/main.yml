# =============================================================================
# Setup role — One-time server provisioning
# Installs Docker, creates directory layout, configures firewall & Nginx/SSL
# =============================================================================
---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install system dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
      - python3-venv
      - ufw
      - fail2ban
      - htop
      - jq
      - unzip
      - git
    state: present

# ── Docker ────────────────────────────────────────────────────────────────────
- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Add Docker repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
    > /etc/apt/sources-list.d/docker.list
  args:
    creates: /etc/apt/sources-list.d/docker.list

- name: Install Docker Engine
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Add deploy user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

# ── Directory layout ─────────────────────────────────────────────────────────
- name: Create application directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ app_root }}"
    - "{{ app_releases }}"
    - "{{ app_shared }}"
    - "{{ app_shared }}/backups"
    - "{{ app_shared }}/env"

# ── Environment file ─────────────────────────────────────────────────────────
- name: Deploy .env file
  template:
    src: env.j2
    dest: "{{ app_shared }}/env/.env"
    owner: "{{ ansible_user }}"
    mode: "0600"
  tags: [env]

# ── Production docker-compose ────────────────────────────────────────────────
- name: Deploy production docker-compose
  template:
    src: docker-compose.prod.yml.j2
    dest: "{{ app_shared }}/docker-compose.prod.yml"
    owner: "{{ ansible_user }}"
    mode: "0644"
  tags: [compose]

# ── Firewall ─────────────────────────────────────────────────────────────────
- name: Configure UFW defaults
  ufw:
    direction: incoming
    default: deny

- name: Allow required ports
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_ports }}"

- name: Enable UFW
  ufw:
    state: enabled

# ── Fail2ban ─────────────────────────────────────────────────────────────────
- name: Enable fail2ban
  systemd:
    name: fail2ban
    enabled: yes
    state: started

# ── Nginx (reverse proxy + SSL) ──────────────────────────────────────────────
- name: Install Nginx and Certbot
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present
  when: app_domain | default('') | length > 0

- name: Deploy Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/sales-platform
    mode: "0644"
  when: app_domain | default('') | length > 0
  notify: reload nginx

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/sales-platform
    dest: /etc/nginx/sites-enabled/sales-platform
    state: link
  when: app_domain | default('') | length > 0
  notify: reload nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: app_domain | default('') | length > 0
  notify: reload nginx

- name: Obtain SSL certificate
  shell: >
    certbot --nginx -d {{ app_domain }}
    --non-interactive --agree-tos -m {{ certbot_email }}
    --redirect
  args:
    creates: /etc/letsencrypt/live/{{ app_domain }}/fullchain.pem
  when: app_domain | default('') | length > 0

- name: Certbot renewal cron
  cron:
    name: "certbot-renew"
    minute: "30"
    hour: "2"
    job: "certbot renew --quiet --post-hook 'systemctl reload nginx'"
  when: app_domain | default('') | length > 0

# ── Backup cron (host-level, calls docker exec) ──────────────────────────────
- name: Deploy backup script
  copy:
    src: "{{ playbook_dir }}/../scripts/backup.sh"
    dest: "{{ app_shared }}/backup.sh"
    owner: "{{ ansible_user }}"
    mode: "0755"

- name: Schedule nightly backup cron
  cron:
    name: "platform-backup"
    minute: "{{ backup_cron_minute }}"
    hour: "{{ backup_cron_hour }}"
    job: "cd {{ app_current }}/platform && DOCKER_BIN=/usr/bin/docker PG_CONTAINER=platform-postgres-1 bash {{ app_shared }}/backup.sh >> {{ app_shared }}/backups/cron.log 2>&1"
    user: "{{ ansible_user }}"

# ── Swap (for small VMs) ─────────────────────────────────────────────────────
- name: Check if swap exists
  stat:
    path: /swapfile
  register: swap_file

- name: Create 2GB swap file
  shell: |
    fallocate -l 2G /swapfile
    chmod 600 /swapfile
    mkswap /swapfile
    swapon /swapfile
    echo '/swapfile none swap sw 0 0' >> /etc/fstab
  when: not swap_file.stat.exists

- name: Set swappiness to 10
  sysctl:
    name: vm.swappiness
    value: "10"
    state: present
    sysctl_set: yes

- name: Setup complete
  debug:
    msg: |
      ✅ Server provisioned!
      App root:   {{ app_root }}
      Shared dir: {{ app_shared }}
      Next step:  ansible-playbook playbooks/deploy.yml
