server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version (relates to F208 server-version-leak note — even
    # on the SPA container, nginx/x.y.z in error bodies is recon surface).
    server_tokens off;

    # ─────────────────────────────────────────────────────────────────
    # Regression finding 207 (deploy-drift companion): the previous
    # config set NO Cache-Control headers, so browsers applied their
    # default heuristic caching to `index.html` (~10% of Last-Modified
    # age, often hours to days). When a fix deployed, returning users
    # still received the cached `index.html` → which pointed at the
    # previous build's hashed JS bundle → so shipping code fixes had
    # NO observable effect for anyone with a warm cache until they
    # hard-refreshed.
    #
    # Strategy: Vite emits content-hashed filenames under /assets/
    # (e.g. `/assets/index-abc123.js`). Those are immutable by
    # construction — a new build produces a new hash — so we can
    # cache them aggressively. `index.html` is the ONE file that
    # needs to be re-validated on every navigation to pick up the
    # new asset hashes. Same pattern as the official Vite docs.
    # ─────────────────────────────────────────────────────────────────

    # SPA routing: all non-asset paths fall through to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html MUST NOT be cached — it's the entry point that
    # references the hashed bundle. `no-store` (not just `no-cache`)
    # so intermediate proxies / Cloudflare also don't serve a stale
    # copy. `must-revalidate` is belt-and-suspenders for older
    # browsers that misinterpret no-store.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires 0;
        try_files $uri =404;
    }

    # Vite-hashed static assets — cache forever. The filename changes
    # on every rebuild, so stale versions can't mask a deploy.
    # `immutable` tells modern browsers to skip the conditional-GET
    # revalidation entirely.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Proxy API requests to the backend service. Explicit no-store on
    # API responses so the browser never short-circuits an auth state
    # change with a cached 200 from before the cookie expired.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't let the browser or any intermediate proxy cache API
        # responses. Auth-state-dependent data (jobs, resumes, etc.)
        # served from cache across a session change is an information
        # leak waiting to happen.
        add_header Cache-Control "no-store" always;
    }
}
