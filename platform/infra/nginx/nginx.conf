user  nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Regression finding 208(point 3): hide "nginx/1.29.8" from error
    # bodies and the Server response header. Version disclosure on a
    # public auth endpoint narrows CVE targeting; with this off the
    # Server header becomes the generic "nginx".
    server_tokens off;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20m;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               image/svg+xml;

    # ── Security headers (global) ──
    # Regression finding 219: nginx is the canonical emitter for XFO /
    # XCTO / Referrer-Policy (FastAPI's SecurityHeadersMiddleware stopped
    # setting these in the same round to prevent the duplicate-header
    # emission that produced conflicting XFO values — "DENY" from FastAPI
    # vs "SAMEORIGIN" here — which browsers treated inconsistently and
    # effectively disabled clickjacking defense on Firefox. nginx's
    # `add_header` APPENDS instead of replacing, so both copies were
    # shipping). XFO value flipped SAMEORIGIN → DENY to align with the
    # CSP `frame-ancestors 'none'` intent ("nobody can frame us"). If an
    # intentional same-origin framing use-case ever surfaces, update the
    # CSP first and then loosen XFO in lockstep.
    add_header X-Frame-Options       "DENY"             always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection      "1; mode=block"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Rate limiting ──
    # F208: `login` zone previously `rate=5r/m burst=3`, which tripped
    # BEFORE FastAPI's own login-rate-limiter (6 attempts/hour) on every
    # brute-force sequence and returned an HTML 503 that the SPA
    # couldn't parse into a useful error. Raised to `rate=30r/m` so
    # FastAPI's 429 JSON always wins the race; this nginx zone is now a
    # pure DoS backstop for >30 attempts/minute from a single IP rather
    # than the primary brute-force defense. The per-location `burst`
    # moved to `burst=20 nodelay` for the same reason. See also the
    # `error_page 503` in app.conf / app-tunnel.conf which converts any
    # residual nginx rate-limit hits to JSON 429 instead of HTML 503.
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=30r/m;

    # F208: map nginx's internal 503 (limit_req) status to a proper 429
    # so downstream `error_page` / `return` directives see the honest
    # "Too Many Requests" code. Without this, `limit_req_status 429`
    # is the direct switch but must live on http-level to apply
    # everywhere.
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
