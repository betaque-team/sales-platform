# =============================================================================
# Nginx site config — Cloudflare Tunnel mode
# No SSL needed here: Cloudflare handles HTTPS termination at the edge.
# This only listens on :80 internally and is reached via the tunnel.
# =============================================================================

upstream backend_api {
    server backend:8000;
    keepalive 16;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # ── Trust Cloudflare headers for real client IP ──
    set_real_ip_from 172.16.0.0/12;    # Docker internal
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 173.245.48.0/20;  # Cloudflare ranges
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ── API ──
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Login rate limit ──
    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Frontend (SPA) ──
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Health (for tunnel health checks) ──
    location = /health {
        proxy_pass http://backend_api/api/v1/monitoring;
        access_log off;
    }
}
