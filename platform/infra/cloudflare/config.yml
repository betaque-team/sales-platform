# =============================================================================
# Cloudflare Tunnel configuration
#
# Replace these values after running: make tunnel-create
#   TUNNEL_ID   → from `cloudflared tunnel list`
#   salesplatform.reventlabs.com      → your domain (e.g. sales.yourcompany.com)
#
# Credential file is auto-generated by `cloudflared tunnel create`
# and stored in the cloudflared-creds Docker volume.
# =============================================================================

tunnel: TUNNEL_ID
credentials-file: /etc/cloudflared/creds/TUNNEL_ID.json

# ── Ingress rules ────────────────────────────────────────────────────────────
# All traffic goes to the internal Nginx, which handles routing to
# backend API and frontend SPA.
ingress:
  # API traffic → nginx (which proxies to backend:8000)
  - hostname: salesplatform.reventlabs.com
    path: /api/*
    service: http://nginx:80
    originRequest:
      connectTimeout: 30s
      noTLSVerify: true

  # All other traffic → nginx (which proxies to frontend:80)
  - hostname: salesplatform.reventlabs.com
    service: http://nginx:80
    originRequest:
      connectTimeout: 10s
      noTLSVerify: true

  # Health check endpoint (Cloudflare uses this)
  - hostname: salesplatform.reventlabs.com
    path: /health
    service: http://nginx:80

  # Catch-all (required by cloudflared)
  - service: http_status:404
