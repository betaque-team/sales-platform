tunnel: b4bc274b-df62-4fd0-975d-c89c15ff7343
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: salesplatform.reventlabs.com
    path: "/api/*"
    service: http://backend:8000
    originRequest:
      connectTimeout: 30s
      noTLSVerify: true

  - hostname: salesplatform.reventlabs.com
    path: "/health"
    service: http://backend:8000

  - hostname: salesplatform.reventlabs.com
    service: http://frontend:80
    originRequest:
      connectTimeout: 10s

  - service: http_status:404
