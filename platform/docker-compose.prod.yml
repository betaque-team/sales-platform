# =============================================================================
# Production Docker Compose
# - Internal-only networking (no exposed ports except through Nginx)
# - Healthchecks on all services
# - Resource limits for small VMs (4 CPU / 4-8 GB RAM)
# - Named volumes for persistence
# - Automatic restarts
#
# Usage:
#   make deploy          (or: docker compose -f docker-compose.prod.yml up -d)
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-jobplatform}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: platform-backend:${RELEASE_TAG:-latest}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - BACKUP_DIR=/app/backups
      - BACKUP_KEEP_LAST=${BACKUP_KEEP_LAST:-14}
      # VM host-metrics snapshot (written by /usr/local/bin/collect-host-metrics.sh
      # on the VM; see docs/VM_MONITORING.md). Absence is handled gracefully.
      - HOST_METRICS_PATH=/host/metrics.json
    volumes:
      - backups:/app/backups
      # Host-side metrics snapshot, read-only. The host file MUST exist before
      # compose starts — run the collector once manually (see VM_MONITORING.md).
      - /opt/sales-platform/host-metrics.json:/host/metrics.json:ro
    networks:
      - internal
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      # F234-followup: previously hit /api/v1/monitoring which is
      # admin-auth-gated and always returned 401 → urlopen raised
      # HTTPError → docker marked the backend "unhealthy" forever
      # (12+ failing streaks at deploy time). The container was
      # still serving traffic fine, but the unhealthy flag blocked
      # `--no-deps`-less restarts of dependent services. Switched
      # to /api/health (public, returns 200) so the healthcheck
      # actually verifies "is the FastAPI app responsive" without
      # tripping on auth.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  celery-worker:
    image: platform-backend:${RELEASE_TAG:-latest}
    restart: always
    command: celery -A app.workers.celery_app worker -l info --concurrency=${CELERY_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - BACKUP_DIR=/app/backups
      - BACKUP_KEEP_LAST=${BACKUP_KEEP_LAST:-14}
    volumes:
      - backups:/app/backups
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  celery-beat:
    image: platform-backend:${RELEASE_TAG:-latest}
    restart: always
    command: celery -A app.workers.celery_app beat -l info
    depends_on:
      - celery-worker
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: platform-frontend:${RELEASE_TAG:-latest}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "127.0.0.1:3000:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ── Nginx reverse proxy (HTTPS termination) ──
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      # F234-followup: Cloudflare tunnel (cloudflared) is configured
      # in the zero-trust dashboard to forward to http://localhost:8080
      # rather than :80. Without this loopback mapping, every nginx
      # container restart leaves cloudflared spitting "connection
      # refused" and the public URL 502s. Loopback-only because
      # there's no reason to expose 8080 publicly.
      - "127.0.0.1:8080:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - nginx-html:/usr/share/nginx/html
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  # ── Certbot (SSL certificate management) ──
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - nginx-html:/usr/share/nginx/html
    networks:
      - internal
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet; done'"

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  backups:
  certbot-etc:
  certbot-var:
  nginx-html:
