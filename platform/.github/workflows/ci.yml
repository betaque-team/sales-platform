# =============================================================================
# CI — Runs on every push/PR: lint, test, build
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jobplatform
  DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/jobplatform
  REDIS_URL: redis://localhost:6379/0
  JWT_SECRET: ci-test-secret
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: jobplatform

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobplatform
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install \
            "fastapi[standard]>=0.115" "uvicorn[standard]>=0.32" \
            "sqlalchemy[asyncio]>=2.0" "asyncpg>=0.30" "alembic>=1.14" \
            "pydantic-settings>=2.6" "httpx>=0.28" \
            "python-jose[cryptography]>=3.3" "celery[redis]>=5.4" \
            "redis>=5.2" "pyyaml>=6.0" "python-multipart>=0.0.12" \
            "itsdangerous>=2.1" "psycopg2-binary>=2.9" \
            "pdfplumber>=0.11" "python-docx>=1.1" "anthropic>=0.40" \
            "beautifulsoup4>=4.12" "dnspython>=2.6" \
            pytest pytest-asyncio httpx

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend build ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Docker build (verify images build successfully) ────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t platform-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t platform-frontend:ci ./frontend

      - name: Verify images
        run: |
          docker images platform-backend:ci
          docker images platform-frontend:ci
